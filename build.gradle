plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

neoForge {
    version = neo_version

    runs {
        client {
            client()
        }
    }

    mods {
        sagadyssey {
            sourceSet sourceSets.main
        }
    }
}
